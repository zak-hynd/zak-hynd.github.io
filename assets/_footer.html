<script>
document.addEventListener('DOMContentLoaded', function () {
  var icon = document.querySelector('i.bi-envelope');
  if (!icon) return;
  var link = icon.closest('a');
  if (!link) return;
  link.addEventListener('click', function (e) {
    e.preventDefault();
    navigator.clipboard.writeText('zak.hynd@gmail.com').then(function () {
      var toast = document.createElement('span');
      toast.textContent = 'Email copied';
      toast.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:#30203e;' +
        'color:#dce3ec;padding:6px 12px;border-radius:6px;font-size:0.8rem;' +
        'z-index:1000;opacity:0;transition:opacity 0.25s';
      document.body.appendChild(toast);
      requestAnimationFrame(function () { toast.style.opacity = '1'; });
      setTimeout(function () {
        toast.style.opacity = '0';
        setTimeout(function () { toast.remove(); }, 300);
      }, 1500);
    });
  });
});
</script>
